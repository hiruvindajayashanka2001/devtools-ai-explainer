<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Explainer Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f13;
      color: #e4e4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1a28;
      border: 1px solid #2a2a40;
      border-radius: 12px;
      padding: 32px;
      width: 440px;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #4ade80;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 12px;
      color: #6060a0;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #7070a0;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 10px;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: #13131f;
      border: 1px solid #2a2a40;
      border-radius: 8px;
      padding: 11px 44px 11px 13px;
      color: #e4e4f0;
      font-size: 13px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #4ade80;
    }

    .toggle-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #6060a0;
      cursor: pointer;
      font-size: 15px;
      padding: 0;
    }

    .toggle-btn:hover { color: #a0a0c0; }

    .hint {
      font-size: 11px;
      color: #4a4a6a;
      margin-bottom: 22px;
      line-height: 1.6;
    }

    .hint a {
      color: #4ade80;
      text-decoration: none;
    }

    .btn-save {
      width: 100%;
      background: linear-gradient(135deg, #16a34a, #4ade80);
      color: #0a1a0a;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-save:hover { opacity: 0.9; }

    .status {
      margin-top: 14px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
      color: #4ade80;
    }

    .status.error { color: #f87171; }

    .divider {
      border: none;
      border-top: 1px solid #2a2a40;
      margin: 24px 0;
    }

    .current-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #6060a0;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2a2a40;
      flex-shrink: 0;
    }

    .dot.active { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">⚡ AI Explainer</div>
    <div class="subtitle">Settings — API Key Configuration</div>

    <div class="current-status">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">Checking saved key...</span>
    </div>

    <hr class="divider">

    <label for="apiKey">Gemini API Key</label>
    <div class="input-wrap">
      <input type="password" id="apiKey" placeholder="AIza..." autocomplete="off" />
      <button class="toggle-btn" id="toggleVisibility" title="Show/hide key">👁️</button>
    </div>

    <p class="hint">
      Get a free key from <a href="https://aistudio.google.com" target="_blank">aistudio.google.com</a>.
      Free tier: 15 req/min · 1500 req/day. Your key is stored locally on your device only — never sent anywhere except directly to Google's API.
    </p>

    <button class="btn-save" id="saveBtn">Save API Key</button>
    <div class="status" id="statusMsg"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
